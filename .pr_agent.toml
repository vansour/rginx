[config]
model = "gpt-5.4"
fallback_models = ["gpt-5.3-codex"]

[pr_reviewer]
extra_instructions = """
请使用中文回复，并优先给出高信号、可执行的代码审查意见。

审查原则：
1. 先找真实缺陷、行为回归、安全问题、并发问题和边界条件问题，不要把回复重心放在风格偏好。
2. 优先指出会导致错误结果、崩溃、数据损坏、资源泄漏、权限问题、性能退化或可维护性明显下降的问题。
3. 如果发现测试覆盖缺口、文档未同步或错误处理不完整，可以指出，但优先级低于真实缺陷。
4. 不要为了“建议而建议”提出低价值重构；只有在能明确降低风险或提升可维护性时才建议重构。

输出要求：
1. 优先按严重程度列出 findings。
2. 每条 finding 尽量说明影响范围、触发条件和建议修复方向。
3. 如果没有发现明确问题，请明确说“未发现阻塞性问题”，并补充残余风险或测试缺口。
"""

[litellm]
api_base = "https://newapi.vansour.net/v1"
