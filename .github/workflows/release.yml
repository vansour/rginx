name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify Tag And Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Validate Tag Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Unsupported release tag format: ${TAG}" >&2
            exit 1
          fi

          COMMIT_SHA="$(git rev-list -n 1 "${TAG}")"
          if [[ -z "${COMMIT_SHA}" ]]; then
            echo "Unable to resolve commit SHA for tag ${TAG}" >&2
            exit 1
          fi

          if [[ "${TAG}" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "commit_sha=${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Validate Tag Commit Against Main
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.meta.outputs.tag }}"
          COMMIT_SHA="${{ steps.meta.outputs.commit_sha }}"
          PRERELEASE="${{ steps.meta.outputs.prerelease }}"
          RELEASE_BRANCH="release/${TAG}"

          git fetch --no-tags origin main
          MAIN_SHA="$(git rev-parse origin/main)"
          RELEASE_BRANCH_EXISTS=false
          RELEASE_BRANCH_SHA=""

          if git ls-remote --exit-code --heads origin "${RELEASE_BRANCH}" >/dev/null 2>&1; then
            git fetch --no-tags origin "+refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
            RELEASE_BRANCH_EXISTS=true
            RELEASE_BRANCH_SHA="$(git rev-parse "origin/${RELEASE_BRANCH}")"
          fi

          if [[ "${PRERELEASE}" == "true" ]]; then
            if git merge-base --is-ancestor "${COMMIT_SHA}" origin/main; then
              :
            elif [[ "${RELEASE_BRANCH_EXISTS}" == "true" ]] && git merge-base --is-ancestor "${COMMIT_SHA}" "origin/${RELEASE_BRANCH}"; then
              :
            elif [[ "${RELEASE_BRANCH_EXISTS}" == "true" ]]; then
              echo "Prerelease tag ${TAG} points to ${COMMIT_SHA}, which is not reachable from origin/main (${MAIN_SHA}) or origin/${RELEASE_BRANCH} (${RELEASE_BRANCH_SHA})." >&2
              exit 1
            else
              echo "Prerelease tag ${TAG} points to ${COMMIT_SHA}, which is not reachable from origin/main (${MAIN_SHA}) and release branch origin/${RELEASE_BRANCH} does not exist." >&2
              exit 1
            fi
          elif [[ "${COMMIT_SHA}" != "${MAIN_SHA}" ]]; then
            echo "Stable release tag ${TAG} must point to origin/main HEAD (${MAIN_SHA}), got ${COMMIT_SHA}." >&2
            exit 1
          fi

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check Formatting
        run: cargo fmt --all --check

      - name: Run Fast Test Layer
        run: ./scripts/test-fast.sh

      - name: Run Clippy
        run: ./scripts/run-clippy-gate.sh

      - name: Run Slow Test Layer
        run: ./scripts/test-slow.sh

      - name: Run TLS Release Gate
        run: ./scripts/run-tls-gate.sh

      - name: Run HTTP/3 Release Gate
        run: ./scripts/run-http3-release-gate.sh --soak-iterations 1

      - name: Install Nightly Rust Toolchain For Prerelease Fuzzing
        if: ${{ steps.meta.outputs.prerelease == 'true' }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-24

      - name: Install cargo-fuzz For Prerelease Verify
        if: ${{ steps.meta.outputs.prerelease == 'true' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Run Prerelease Fuzz Smoke
        if: ${{ steps.meta.outputs.prerelease == 'true' }}
        run: ./scripts/run-fuzz-smoke.sh --seconds 10

  build:
    name: Build ${{ matrix.asset_name }} Assets
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            cargo_package: rginx
            bin_name: rginx
            asset_prefix: rginx
            target: x86_64-unknown-linux-gnu
            os: linux
            arch: amd64
            archive_ext: tar.gz
            asset_name: rginx-linux-amd64
          - runner: ubuntu-24.04-arm
            cargo_package: rginx
            bin_name: rginx
            asset_prefix: rginx
            target: aarch64-unknown-linux-gnu
            os: linux
            arch: arm64
            archive_ext: tar.gz
            asset_name: rginx-linux-arm64
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Build Release Binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release -p "${{ matrix.cargo_package }}" --target "${{ matrix.target }}"

      - name: Package Release Archive
        id: package
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.verify.outputs.tag }}"
          STAGING_ROOT="$(mktemp -d)"
          PKG_DIR="${{ matrix.asset_prefix }}-${TAG#v}-${{ matrix.os }}-${{ matrix.arch }}"
          INSTALL_DIR="${STAGING_ROOT}/${PKG_DIR}"
          ARCHIVE_NAME="${{ matrix.asset_prefix }}-${TAG}-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.archive_ext }}"

          mkdir -p "${INSTALL_DIR}"
          install -m 755 "target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "${INSTALL_DIR}/${{ matrix.bin_name }}"
          cp README.md "${INSTALL_DIR}/README.md"
          [[ -f CHANGELOG.md ]] || {
            echo "CHANGELOG.md is required for release packaging" >&2
            exit 1
          }
          cp CHANGELOG.md "${INSTALL_DIR}/CHANGELOG.md"
          cp LICENSE "${INSTALL_DIR}/LICENSE"
          cp LICENSE-APACHE "${INSTALL_DIR}/LICENSE-APACHE"
          cp LICENSE-MIT "${INSTALL_DIR}/LICENSE-MIT"
          cp -R configs "${INSTALL_DIR}/configs"
          cp -R scripts "${INSTALL_DIR}/scripts"
          mkdir -p "${INSTALL_DIR}/deploy"
          cp -R deploy/systemd "${INSTALL_DIR}/deploy/systemd"
          cp -R deploy/supervisor "${INSTALL_DIR}/deploy/supervisor"

          mkdir -p dist
          tar -C "${STAGING_ROOT}" -czf "dist/${ARCHIVE_NAME}" "${PKG_DIR}"

          echo "archive_name=${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload Release Assets
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-${{ matrix.asset_name }}
          path: dist/${{ steps.package.outputs.archive_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - verify
      - build
    if: ${{ always() && needs.verify.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag }}

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist/artifacts

      - name: Collect Release Assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find dist/artifacts -type f -name '*.tar.gz' -exec mv {} dist/ \;
          ls -1 dist/*.tar.gz >/dev/null

      - name: Generate Checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f -name '*.tar.gz' -printf '%f\n' \
            | sort \
            | while IFS= read -r asset; do
                sha256sum "dist/${asset}"
              done > dist/SHA256SUMS.txt

      - name: Build Release Body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${{ needs.verify.outputs.tag }}"
          COMMIT_SHA="${{ needs.verify.outputs.commit_sha }}"
          SHORT_SHA="${COMMIT_SHA::7}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${COMMIT_SHA}"
          RELEASE_NOTES_PATH="release-notes/${TAG}.md"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${COMMIT_SHA}^" 2>/dev/null || true)"
          CHANGELOG_RANGE="${COMMIT_SHA}"
          CHANGELOG_TITLE="Initial release changes"
          REQUIRED_RELEASE_NOTES_HEADINGS=(
            "## 新增"
            "## 更新与改进"
            "## 问题修复"
            "## New"
            "## Update & Improvement"
            "## Bug Fixed"
          )

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            CHANGELOG_RANGE="${PREVIOUS_TAG}..${COMMIT_SHA}"
            CHANGELOG_TITLE="Changes since \`${PREVIOUS_TAG}\`"
          fi

          mkdir -p dist

          git log \
            --reverse \
            --no-merges \
            --pretty=format:"- [\`%h\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/%H) %s" \
            "${CHANGELOG_RANGE}" > dist/changelog.md

          if [[ ! -s dist/changelog.md ]]; then
            echo "- No source changes found in the selected release range." > dist/changelog.md
          fi

          [[ -f "${RELEASE_NOTES_PATH}" ]] || {
            echo "missing hand-written release notes: ${RELEASE_NOTES_PATH}" >&2
            exit 1
          }
          for heading in "${REQUIRED_RELEASE_NOTES_HEADINGS[@]}"; do
            grep -Fq "${heading}" "${RELEASE_NOTES_PATH}" || {
              echo "release notes file ${RELEASE_NOTES_PATH} must contain section: ${heading}" >&2
              exit 1
            }
          done

          {
            echo "Release for \`${TAG}\`"
            echo
            echo "- Commit: [\`${SHORT_SHA}\`](${COMMIT_URL})"
            if [[ -n "${PREVIOUS_TAG}" ]]; then
              echo "- Previous tag: \`${PREVIOUS_TAG}\`"
              echo "- Compare: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG}"
            else
              echo "- Previous tag: none (initial release)"
            fi
            echo
            echo "## Assets"
            find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name 'SHA256SUMS.txt' \) -printf '%f\n' \
              | sort \
              | while IFS= read -r asset; do
                  echo "- \`${asset}\`"
                done
            echo
            echo "## Install"
            echo
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/scripts/install.sh | \\"
            echo "  bash -s -- --mode release --version ${TAG}"
            echo '```'
            echo
          } > dist/release-summary.md

          cat dist/release-summary.md > dist/release-body.md
          printf '\n' >> dist/release-body.md
          cat "${RELEASE_NOTES_PATH}" >> dist/release-body.md
          printf '\n\n## Source Changelog\n%s\n\n' "${CHANGELOG_TITLE}" >> dist/release-body.md
          cat dist/changelog.md >> dist/release-body.md

      - name: Create Or Update Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${{ needs.verify.outputs.tag }}"
          PRERELEASE="${{ needs.verify.outputs.prerelease }}"

          release_args=(--title "${TAG}" --verify-tag --notes-file dist/release-body.md)
          edit_args=(--title "${TAG}" --notes-file dist/release-body.md)

          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
            edit_args+=(--prerelease)
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --draft=false "${edit_args[@]}"
            gh release upload "${TAG}" dist/*.tar.gz dist/SHA256SUMS.txt --clobber
          else
            gh release create "${TAG}" dist/*.tar.gz dist/SHA256SUMS.txt "${release_args[@]}"
          fi
