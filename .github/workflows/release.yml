name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: rginx
  CARGO_PACKAGE: rginx
  PAGES_APT_SUBDIR: apt

jobs:
  verify:
    name: Verify Tag And Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Validate Tag Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?$ ]]; then
            echo "Unsupported release tag format: ${TAG}" >&2
            exit 1
          fi

          COMMIT_SHA="$(git rev-list -n 1 "${TAG}")"
          if [[ -z "${COMMIT_SHA}" ]]; then
            echo "Unable to resolve commit SHA for tag ${TAG}" >&2
            exit 1
          fi

          if [[ "${TAG}" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "commit_sha=${COMMIT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Validate Tag Commit Against Main
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.meta.outputs.tag }}"
          COMMIT_SHA="${{ steps.meta.outputs.commit_sha }}"
          PRERELEASE="${{ steps.meta.outputs.prerelease }}"
          RELEASE_BRANCH="release/${TAG}"

          git fetch --no-tags origin main
          MAIN_SHA="$(git rev-parse origin/main)"
          RELEASE_BRANCH_EXISTS=false
          RELEASE_BRANCH_SHA=""

          if git ls-remote --exit-code --heads origin "${RELEASE_BRANCH}" >/dev/null 2>&1; then
            git fetch --no-tags origin "+refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}"
            RELEASE_BRANCH_EXISTS=true
            RELEASE_BRANCH_SHA="$(git rev-parse "origin/${RELEASE_BRANCH}")"
          fi

          if [[ "${PRERELEASE}" == "true" ]]; then
            if git merge-base --is-ancestor "${COMMIT_SHA}" origin/main; then
              :
            elif [[ "${RELEASE_BRANCH_EXISTS}" == "true" ]] && git merge-base --is-ancestor "${COMMIT_SHA}" "origin/${RELEASE_BRANCH}"; then
              :
            elif [[ "${RELEASE_BRANCH_EXISTS}" == "true" ]]; then
              echo "Prerelease tag ${TAG} points to ${COMMIT_SHA}, which is not reachable from origin/main (${MAIN_SHA}) or origin/${RELEASE_BRANCH} (${RELEASE_BRANCH_SHA})." >&2
              exit 1
            else
              echo "Prerelease tag ${TAG} points to ${COMMIT_SHA}, which is not reachable from origin/main (${MAIN_SHA}) and release branch origin/${RELEASE_BRANCH} does not exist." >&2
              exit 1
            fi
          elif [[ "${COMMIT_SHA}" != "${MAIN_SHA}" ]]; then
            echo "Stable release tag ${TAG} must point to origin/main HEAD (${MAIN_SHA}), got ${COMMIT_SHA}." >&2
            exit 1
          fi

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check Formatting
        run: cargo fmt --all --check

      - name: Run Fast Test Layer
        run: ./scripts/test-fast.sh

      - name: Run Slow Test Layer
        run: ./scripts/test-slow.sh

      - name: Run TLS Release Gate
        run: ./scripts/run-tls-gate.sh

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  build:
    name: Build ${{ matrix.asset_name }} Assets
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            os: linux
            arch: amd64
            archive_ext: tar.gz
            asset_name: linux-amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
            arch: arm64
            archive_ext: tar.gz
            asset_name: linux-arm64
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Build Release Binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release -p "${CARGO_PACKAGE}" --target "${{ matrix.target }}"

      - name: Package Release Archive
        id: package
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ needs.verify.outputs.tag }}"
          STAGING_ROOT="$(mktemp -d)"
          PKG_DIR="rginx-${TAG#v}-${{ matrix.os }}-${{ matrix.arch }}"
          INSTALL_DIR="${STAGING_ROOT}/${PKG_DIR}"
          ARCHIVE_NAME="rginx-${TAG}-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.archive_ext }}"

          mkdir -p "${INSTALL_DIR}"
          install -m 755 "target/${{ matrix.target }}/release/${BIN_NAME}" "${INSTALL_DIR}/${BIN_NAME}"
          cp README.md "${INSTALL_DIR}/README.md"
          cp LICENSE "${INSTALL_DIR}/LICENSE"
          cp LICENSE-APACHE "${INSTALL_DIR}/LICENSE-APACHE"
          cp LICENSE-MIT "${INSTALL_DIR}/LICENSE-MIT"
          cp -R configs "${INSTALL_DIR}/configs"
          cp -R scripts "${INSTALL_DIR}/scripts"

          mkdir -p dist
          tar -C "${STAGING_ROOT}" -czf "dist/${ARCHIVE_NAME}" "${PKG_DIR}"

          echo "archive_name=${ARCHIVE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Build Debian Package
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-deb.sh \
            --skip-build \
            --binary "target/${{ matrix.target }}/release/${BIN_NAME}" \
            --out-dir dist/debian

      - name: Upload Release Assets
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-${{ matrix.asset_name }}
          path: |
            dist/${{ steps.package.outputs.archive_name }}
            dist/debian/*.deb
          if-no-files-found: error

  build_apt_repo:
    name: Build APT Repository
    needs:
      - verify
      - build
    if: ${{ needs.verify.outputs.prerelease != 'true' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist/artifacts

      - name: Collect Debian Packages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/debian
          find dist/artifacts -type f -name '*.deb' -exec mv {} dist/debian/ \;
          ls -1 dist/debian/*.deb >/dev/null

      - name: Import APT Signing Key
        shell: bash
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${APT_GPG_PRIVATE_KEY}" ]]; then
            echo "APT_GPG_PRIVATE_KEY secret is required for stable release publishing." >&2
            exit 1
          fi

          export GNUPGHOME="$(mktemp -d)"
          printf '%s' "${APT_GPG_PRIVATE_KEY}" | gpg --batch --import
          echo "GNUPGHOME=${GNUPGHOME}" >> "${GITHUB_ENV}"

      - name: Build GitHub Pages Site
        shell: bash
        env:
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          if [[ -z "${APT_GPG_KEY_ID}" ]]; then
            echo "APT_GPG_KEY_ID secret is required for stable release publishing." >&2
            exit 1
          fi

          SITE_ROOT="_site"
          REPO_ROOT="${SITE_ROOT}/${PAGES_APT_SUBDIR}"
          DEFAULT_REPO_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/${PAGES_APT_SUBDIR}"

          mkdir -p "${SITE_ROOT}"
          touch "${SITE_ROOT}/.nojekyll"

          ./scripts/publish-apt-repo.sh \
            --repo-root "${REPO_ROOT}" \
            --deb-dir dist/debian \
            --gpg-key "${APT_GPG_KEY_ID}" \
            --export-key "${REPO_ROOT}/rginx-archive-keyring.gpg"

          cat > "${SITE_ROOT}/index.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>rginx Packages</title>
            <style>
              body { font-family: sans-serif; max-width: 860px; margin: 3rem auto; padding: 0 1rem; line-height: 1.6; }
              pre { background: #f6f8fa; padding: 1rem; overflow-x: auto; }
              code { font-family: ui-monospace, SFMono-Regular, monospace; }
            </style>
          </head>
          <body>
            <h1>rginx Packages</h1>
            <p>This GitHub Pages site publishes the latest stable APT repository for <code>rginx</code>.</p>
            <p>The repository root is the <code>${PAGES_APT_SUBDIR}/</code> subdirectory of this site.</p>
            <p>Default GitHub Pages URL:</p>
            <pre><code>${DEFAULT_REPO_URL}</code></pre>
            <p>Repository signing key:</p>
            <pre><code>curl -fsSL ${DEFAULT_REPO_URL}/rginx-archive-keyring.gpg | sudo tee /usr/share/keyrings/rginx-archive-keyring.gpg >/dev/null</code></pre>
            <p>APT source:</p>
            <pre><code>echo "deb [signed-by=/usr/share/keyrings/rginx-archive-keyring.gpg] ${DEFAULT_REPO_URL} stable main" | sudo tee /etc/apt/sources.list.d/rginx.list
            sudo apt update
            sudo apt install rginx</code></pre>
          </body>
          </html>
          EOF

          cat > "${REPO_ROOT}/index.html" <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>rginx APT Repository</title>
            <style>
              body { font-family: sans-serif; max-width: 860px; margin: 3rem auto; padding: 0 1rem; line-height: 1.6; }
              pre { background: #f6f8fa; padding: 1rem; overflow-x: auto; }
              code { font-family: ui-monospace, SFMono-Regular, monospace; }
            </style>
          </head>
          <body>
            <h1>rginx APT Repository</h1>
            <p>This directory is a static APT repository signed by the release workflow.</p>
            <p>Key file:</p>
            <pre><code>rginx-archive-keyring.gpg</code></pre>
            <p>Suite and component:</p>
            <pre><code>stable main</code></pre>
          </body>
          </html>
          EOF

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Clean Up Imported GnuPG Home
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${GNUPGHOME:-}" && -d "${GNUPGHOME}" ]]; then
            rm -rf "${GNUPGHOME}"
          fi

  deploy_apt_repo:
    name: Deploy APT Repository
    needs: build_apt_repo
    if: ${{ needs.build_apt_repo.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    name: Publish GitHub Release
    needs:
      - verify
      - build
      - build_apt_repo
      - deploy_apt_repo
    if: ${{ always() && needs.verify.result == 'success' && needs.build.result == 'success' && (needs.build_apt_repo.result == 'success' || needs.build_apt_repo.result == 'skipped') && (needs.deploy_apt_repo.result == 'success' || needs.deploy_apt_repo.result == 'skipped') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.verify.outputs.tag }}

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist/artifacts

      - name: Collect Release Assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find dist/artifacts -type f \( -name '*.tar.gz' -o -name '*.deb' \) -exec mv {} dist/ \;
          ls -1 dist/*.tar.gz >/dev/null
          ls -1 dist/*.deb >/dev/null

      - name: Generate Checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.deb' \) -printf '%f\n' \
            | sort \
            | while IFS= read -r asset; do
                sha256sum "dist/${asset}"
              done > dist/SHA256SUMS.txt

      - name: Build Release Notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${{ needs.verify.outputs.tag }}"
          COMMIT_SHA="${{ needs.verify.outputs.commit_sha }}"
          SHORT_SHA="${COMMIT_SHA::7}"
          COMMIT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${COMMIT_SHA}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${COMMIT_SHA}^" 2>/dev/null || true)"
          CHANGELOG_RANGE="${COMMIT_SHA}"
          CHANGELOG_TITLE="Initial release changes"

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            CHANGELOG_RANGE="${PREVIOUS_TAG}..${COMMIT_SHA}"
            CHANGELOG_TITLE="Changes since \`${PREVIOUS_TAG}\`"
          fi

          mkdir -p dist

          git log \
            --reverse \
            --no-merges \
            --pretty=format:"- [\`%h\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/%H) %s" \
            "${CHANGELOG_RANGE}" > dist/changelog.md

          if [[ ! -s dist/changelog.md ]]; then
            echo "- No source changes found in the selected release range." > dist/changelog.md
          fi

          {
            echo "Release for \`${TAG}\`"
            echo
            echo "- Commit: [\`${SHORT_SHA}\`](${COMMIT_URL})"
            if [[ -n "${PREVIOUS_TAG}" ]]; then
              echo "- Previous tag: \`${PREVIOUS_TAG}\`"
              echo "- Compare: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${TAG}"
            else
              echo "- Previous tag: none (initial release)"
            fi
            echo
            echo "## Assets"
            find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.deb' -o -name 'SHA256SUMS.txt' \) -printf '%f\n' \
              | sort \
              | while IFS= read -r asset; do
                  echo "- \`${asset}\`"
                done
            echo
            if [[ "${{ needs.verify.outputs.prerelease }}" != "true" ]]; then
              echo "## APT Repository"
              echo
              echo "- Stable tags also publish a signed GitHub Pages APT repository."
              echo "- Configure Pages once in the repository settings and add the signing secrets documented in the README."
              echo
            fi
            echo "## Changelog"
            echo "${CHANGELOG_TITLE}"
            echo
            cat dist/changelog.md
            echo
          } > dist/release-summary.md

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${TAG}" \
              -f target_commitish="${COMMIT_SHA}" \
              -f previous_tag_name="${PREVIOUS_TAG}" \
              -f configuration_file_path=".github/release.yml" \
              --jq '.body' > dist/generated-notes.md
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${TAG}" \
              -f target_commitish="${COMMIT_SHA}" \
              -f configuration_file_path=".github/release.yml" \
              --jq '.body' > dist/generated-notes.md
          fi

          cat dist/release-summary.md > dist/release-body.md
          printf '\n' >> dist/release-body.md
          cat dist/generated-notes.md >> dist/release-body.md

      - name: Create Or Update Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${{ needs.verify.outputs.tag }}"
          PRERELEASE="${{ needs.verify.outputs.prerelease }}"

          release_args=(--title "${TAG}" --verify-tag --notes-file dist/release-body.md)
          edit_args=(--title "${TAG}" --notes-file dist/release-body.md)

          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
            edit_args+=(--prerelease)
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --draft=false "${edit_args[@]}"
            gh release upload "${TAG}" dist/*.tar.gz dist/*.deb dist/SHA256SUMS.txt --clobber
          else
            gh release create "${TAG}" dist/*.tar.gz dist/*.deb dist/SHA256SUMS.txt "${release_args[@]}"
          fi
