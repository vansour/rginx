name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run_fuzz_smoke:
        description: "Also run the optional fuzz smoke job"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  http3-release:
    name: HTTP/3 Release Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6.0.2

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: nightly-http3-release

      - name: Run HTTP/3 Release Gate
        run: ./scripts/run-http3-release-gate.sh --soak-iterations 3

  fuzz-smoke:
    name: Fuzz Smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_fuzz_smoke }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check Out Source
        uses: actions/checkout@v6.0.2

      - name: Install Nightly Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Restore Rust Cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: nightly-fuzz-smoke

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run Fuzz Smoke Targets
        run: ./scripts/run-fuzz-smoke.sh --seconds 10
