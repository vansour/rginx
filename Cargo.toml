[workspace]
members = ["crates/*"]
default-members = ["crates/rginx-app"]
resolver = "2"

[workspace.dependencies]
anyhow = "1.0"
bytes = "1.11"
clap = { version = "4.6", features = ["derive"] }
http = "1.4"
http-body-util = "0.1"
hyper = { version = "1.8", features = ["client", "http1", "server"] }
hyper-rustls = { version = "0.27.7", default-features = false, features = ["aws-lc-rs", "http1", "native-tokio", "tls12"] }
hyper-util = { version = "0.1", features = ["client", "client-legacy", "http1", "tokio"] }
ron = "0.12"
rustls = "0.23.37"
rustls-pemfile = "2.2"
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0"
tokio = { version = "1.50", features = ["macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
